<!-- components/modal-search.html -->
<div class="modal fade" id="modal-search" tabindex="-1" aria-labelledby="modalSearchLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content rounded-4 shadow-sm" style="background-color: #f8f9fa; border: none;">
      <div class="modal-header border-bottom-0">
        <h5 class="modal-title" id="modalSearchLabel">Search products</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <p class="text-muted mb-3" style="font-size: 0.9rem;">Find solid wood furniture and accessories from David's Wood.</p>
        <div class="mb-3">
          <input type="text" class="form-control form-control-lg border-2" id="search-input" placeholder="Search by name..." autofocus>
        </div>
        <div id="search-results" class="border rounded-3 p-3 bg-light text-muted" style="border: 1px solid #e0e0e0;">
          Start typing to see results.
        </div>
      </div>
    </div>
  </div>
</div>
