<!-- components/modal-search.html-->
<div class="modal fade" id="modal-search" tabindex="-1" aria-labelledby="modal-searchLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-4 shadow-sm" style="background-color: #f5f3ed; border: 1px solid #e0e0e0;">
      <div class="modal-header">
        <span class="modal-title fw-medium fs-5">
          Search products
        </span>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body px-4 pb-4">
        <p class="text-muted fs-7 ps-1">
          Find solid wood furniture and accessories from David's Wood.
        </p>
        <div class="input-group mb-2">
          <input type="text" class="form-control form-control-lg fs-6 rounded-3p-2 shadow-sm" placeholder="Search by name..." autofocus>
        </div>
        <div class="search-results bg-white rounded-3p-2 shadow-sm">
          <p class="text-muted fs-6 mb-0">Start typing to see results.</p>
        </div>
      </div>
    </div>
  </div>
</div>
