<!-- components/modal-quick-view.html -->
<div class="modal fade" id="modal-quick-view" tabindex="-1" aria-labelledby="quickViewLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content shadow-sm" style="background-color: #f8f9fa;">
      <div class="modal-header border-bottom-0">
        <h5 class="modal-title" id="quickViewLabel">Product Name</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <div class="row g-3">
          <div class="col-md-6">
            <img src="" alt="Product Image" class="img-fluid rounded-4" id="quick-view-image">
            <p class="text-muted small mt-2">preview 1</p>
          </div>
          <div class="col-md-6">
            <div class="justify-content-between align-items-center mb-3">
              <p class="mb-0 text-muted" id="quick-view-desc"></p>
              <div class="d-flex align-items-center">
                <span class="rating me-2">★</span>
                <span class="me-2" id="quick-view-rating">4.5</span>
                <span class="fw-bold" id="quick-view-price">₱1,199.99</span>
              </div>
            </div>

            <div class="border-top pt-3 mb-3">
              <div class="d-flex align-items-center mb-2">
                <i data-lucide="box" class="me-1"></i>
                <strong class="me-1">Material:</strong>
                <span id="quick-view-material">Solid Wood</span>
              </div>
              <div class="d-flex align-items-center">
                <i data-lucide="proportions" class="me-1"></i>
                <strong class="me-1">Dimensions:</strong>
                <span id="quick-view-dimensions">40cm W × 40cm D × 40cm H</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <div class="input-group">
                <button class="btn btn-outline-secondary" type="button" id="decrease-qty">−</button>
                <input type="number" class="form-control text-center" value="1" min="1" id="quantity-input">
                <button class="btn btn-outline-secondary" type="button" id="increase-qty">+</button>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-dark w-100" id="add-to-cart-btn">
                <i data-lucide="shopping-cart" class="me-1"></i> Add to cart
              </button>
              <button class="btn btn-light w-100" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
