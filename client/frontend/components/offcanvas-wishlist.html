<!-- components/offcanvas-wishlist.html -->
<div class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden " id="offcanvas-wishlist">
  <div class="offcanvas fixed right-0 top-0 h-full w-full max-w-md bg-white shadow-xl transform translate-x-full transition-transform duration-300 ease-in-out" id="offcanvas-wishlist-panel">
    <div class="flex items-center justify-between p-6 offcanvas-header">
      <h5 class="text-lg font-semibold" id="offcanvasWishlistLabel">Your Favorites</h5>
      <button type="button" class="text-gray-400 hover:text-gray-600" id="close-wishlist-offcanvas">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="flex-1 p-6 overflow-y-auto text-sm">
      <p>No favorites yet.</p>
    </div>
    <script>
      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape' && window.hideoffcanvaswishlist){ window.hideoffcanvaswishlist(); }
      });
    </script>
  </div>
</div>
